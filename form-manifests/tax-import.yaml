# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  tax-import.yaml — Import ITR JSON                                          ║
# ║  Source: src/pages/TaxImport.tsx + src/tax/itrParser.ts                     ║
# ║                                                                              ║
# ║  Three stages — idle → review (read-only preview) → done.                   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

manifest_id: myfinance_tax_import
manifest_version: "1.0.0"
description: Parse and import an official ITR JSON export (AY 2026-27 schema).

forms:

  tax_import_itr:
    title: Import ITR JSON
    description: >
      Paste in a JSON file generated by the offline utility or downloaded as a
      prefilled return. Schema follows the AY 2026-27 ITR-1 / 2 / 4 spec;
      older schemas may import partially.
    version: "1.0.0"
    form_state: active
    confidentiality: Confidential
    layout:
      type: wizard
    state:
      persistence: in-memory
    submit_label: Save to database
    on_submit:
      type: local
      handler_name: db.tax.commitItrImport

    pages:

      # ── 1. idle: file picker ─────────────────────────────────────────────
      - id: idle
        title: Pick an ITR JSON file
        sections:
          - id: pick
            fields:
              - id: itr_file
                type: file
                label: Choose file
                required: true
                accept: [".json", "application/json"]
                max_size_mb: 10
                on_change:
                  type: local
                  handler_name: tax.parseItrJson
                  binds:
                    parsed: $output
                    error_if:
                      expression: "$output.itrForm == null"
                      message: >
                        This file doesn't look like an ITR JSON for AY 2026-27
                        (no ITR1/ITR2/ITR3/ITR4 root found).

        actions:
          - { id: next, type: nav-next, label: Continue,
              enabled_if: { expression: "fields.parsed?.itrForm != null" } }

      # ── 2. review: read-only preview ─────────────────────────────────────
      - id: review
        title: Review extracted data
        sections:

          - id: summary
            display: read-only
            description:
              computed: >
                fields.parsed.filename + ' · AY ' + (fields.parsed.ay ?? '(unknown)') +
                ' · ITR-' + fields.parsed.itrForm +
                (fields.parsed.unmappedKeyCount > 0
                  ? ' · ' + fields.parsed.unmappedKeyCount + ' unmapped section(s)'
                  : '')

          - id: income_preview
            display: read-only
            description: { computed: "'Income (' + fields.parsed.income.length + ')'" }
            fields:
              - id: income_rows
                type: hidden
                source: computed
                value:
                  expression: "fields.parsed.income.map(r => ({ a: r.label, b: r.head, c: r.amount }))"

          - id: deductions_preview
            display: read-only
            description: { computed: "'Deductions (' + fields.parsed.deductions.length + ')'" }
            fields:
              - id: deduction_rows
                type: hidden
                source: computed
                value:
                  expression: "fields.parsed.deductions.map(r => ({ a: r.label, b: r.section, c: r.amount }))"

          - id: payments_preview
            display: read-only
            description: { computed: "'Tax payments (' + fields.parsed.payments.length + ')'" }
            fields:
              - id: payment_rows
                type: hidden
                source: computed
                value:
                  expression: "fields.parsed.payments.map(r => ({ a: r.payer_name ?? '(unnamed)', b: r.type, c: r.amount }))"

          - id: assessment_stats
            display: read-only
            fields:
              - id: assessment
                type: hidden
                source: computed
                value:
                  expression: >
                    {
                      gross_total: fields.parsed.assessment.gross_total_income,
                      total_income: fields.parsed.assessment.total_income,
                      net_tax: fields.parsed.assessment.net_tax_liability,
                      refund: fields.parsed.assessment.refund_or_balance
                    }

        actions:
          - { id: back,   type: nav-prev, label: Back }
          - { id: commit, type: nav-next, label: Save to database,
              on_action: { type: local, handler_name: db.tax.commitItrImport,
                           payload: { parsed: { ref: parsed } },
                           binds: { ay: $output.ay } } }

      # ── 3. done ───────────────────────────────────────────────────────────
      - id: done
        title:
          computed: "'Imported AY ' + (fields.parsed.ay ?? '2026-27') + ' as ITR-' + fields.parsed.itrForm"
        sections:
          - id: result
            display: read-only
            fields:
              - id: counts
                type: hidden
                source: computed
                value:
                  expression: >
                    {
                      incomes: fields.parsed.income.length,
                      deductions: fields.parsed.deductions.length,
                      payments: fields.parsed.payments.length,
                      unmapped: fields.parsed.unmappedKeyCount
                    }

        actions:
          - { id: open, type: nav-link,
              label: { computed: "'Open AY ' + (fields.parsed.ay ?? '2026-27')" },
              target:    { computed: "'/tax/' + encodeURIComponent(fields.parsed.ay ?? '2026-27')" } }
          - { id: again, type: button, label: Import another,
              on_action: { type: nav, target: idle, reset: true } }
